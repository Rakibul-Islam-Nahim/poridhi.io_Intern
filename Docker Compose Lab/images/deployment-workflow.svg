<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640"
     font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- ============================================================
       Poridhi deployment workflow (animated SVG)
       Compact single-frame layout — all 10 steps visible.
       Only animation: flowing dashed strokes on the arrows.
       No falling pulse dot.
       ============================================================ -->

  <defs>
    <style><![CDATA[
      .bg        { fill:#f8fafc; }
      .title     { fill:#0f172a; font-size:14px; font-weight:700; }
      .subtitle  { fill:#64748b; font-size:10px; }

      .step-num      { fill:#1e40af; font-size:9px;  font-weight:700; letter-spacing:.5px; }
      .step-name     { fill:#0f172a; font-size:11px; font-weight:700; }
      .step-sub      { fill:#475569; font-size:9px;  }

      .step-end-num  { fill:#065f46; font-size:9px;  font-weight:700; letter-spacing:.5px; }
      .step-end-name { fill:#064e3b; font-size:12px; font-weight:800; }

      .card      { fill:#ffffff; stroke:#cbd5e1; stroke-width:1; }
      .card-alt  { fill:#eef2ff; stroke:#a5b4fc; stroke-width:1; }
      .card-end  { fill:#ecfdf5; stroke:#10b981; stroke-width:1.5; }

      .arrow     { stroke:#475569; stroke-width:1.5; }
      .arrow-head{ fill:#475569; }

      /* Only animation: dashed strokes flow downward */
      .flow      { stroke-dasharray:5 4; animation:flow 1.2s linear infinite; }
      @keyframes flow { to { stroke-dashoffset:-18; } }
    ]]></style>

    <marker id="head" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="360" height="640"/>

  <!-- Title block -->
  <text x="180" y="20" text-anchor="middle" class="title">Deployment Workflow</text>
  <text x="180" y="33" text-anchor="middle" class="subtitle">
    From source code → running application via PUKU CLI
  </text>

  <!-- ====================================================
       Layout: 10 cards, 42px tall + 14px arrow gap.
       Top of cards: 50, 106, 162, 218, 274, 330, 386, 442, 498, 554.
       Bottom of last card: 596. Total height 640.
       ==================================================== -->

  <!-- 1. Application Source -->
  <g>
    <rect class="card"     x="50"  y="50"  width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="66">STEP 1</text>
    <text class="step-name" x="105" y="70">Application Source</text>
    <text class="step-sub"  x="62"  y="84">app.py · requirements.txt</text>
  </g>
  <line class="arrow flow" x1="180" y1="92"  x2="180" y2="104" marker-end="url(#head)"/>

  <!-- 2. Dockerfile + compose.yml -->
  <g>
    <rect class="card"     x="50"  y="106" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="122">STEP 2</text>
    <text class="step-name" x="105" y="126">Dockerfile + compose.yml</text>
    <text class="step-sub"  x="62"  y="140">Declarative recipe for image &amp; stack</text>
  </g>
  <line class="arrow flow" x1="180" y1="148" x2="180" y2="160" marker-end="url(#head)"/>

  <!-- 3. PUKU Build -->
  <g>
    <rect class="card-alt" x="50"  y="162" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="178" fill="#3730a3">STEP 3</text>
    <text class="step-name" x="105" y="182">PUKU Build</text>
    <text class="step-sub"  x="62"  y="196" fill="#4338ca">docker compose build</text>
  </g>
  <line class="arrow flow" x1="180" y1="204" x2="180" y2="216" marker-end="url(#head)"/>

  <!-- 4. Docker Image Created -->
  <g>
    <rect class="card"     x="50"  y="218" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="234">STEP 4</text>
    <text class="step-name" x="105" y="238">Docker Image Created</text>
    <text class="step-sub"  x="62"  y="252">poridhi-flask:latest (local cache)</text>
  </g>
  <line class="arrow flow" x1="180" y1="260" x2="180" y2="272" marker-end="url(#head)"/>

  <!-- 5. PUKU Up -->
  <g>
    <rect class="card-alt" x="50"  y="274" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="290" fill="#3730a3">STEP 5</text>
    <text class="step-name" x="105" y="294">PUKU Up</text>
    <text class="step-sub"  x="62"  y="308" fill="#4338ca">docker compose up -d --build</text>
  </g>
  <line class="arrow flow" x1="180" y1="316" x2="180" y2="328" marker-end="url(#head)"/>

  <!-- 6. Network -->
  <g>
    <rect class="card"     x="50"  y="330" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="346">STEP 6</text>
    <text class="step-name" x="105" y="350">Docker Network Created</text>
    <text class="step-sub"  x="62"  y="364">poridhi-net · user-defined bridge</text>
  </g>
  <line class="arrow flow" x1="180" y1="372" x2="180" y2="384" marker-end="url(#head)"/>

  <!-- 7. Volume -->
  <g>
    <rect class="card"     x="50"  y="386" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="402">STEP 7</text>
    <text class="step-name" x="105" y="406">Docker Volume Created</text>
    <text class="step-sub"  x="62"  y="420">poridhi-redis-data · managed</text>
  </g>
  <line class="arrow flow" x1="180" y1="428" x2="180" y2="440" marker-end="url(#head)"/>

  <!-- 8. Redis container -->
  <g>
    <rect class="card"     x="50"  y="442" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="458">STEP 8</text>
    <text class="step-name" x="105" y="462">Redis Container Started</text>
    <text class="step-sub"  x="62"  y="476">poridhi-redis · redis:7-alpine</text>
  </g>
  <line class="arrow flow" x1="180" y1="484" x2="180" y2="496" marker-end="url(#head)"/>

  <!-- 9. Flask container -->
  <g>
    <rect class="card"     x="50"  y="498" width="260" height="42" rx="6"/>
    <text class="step-num"  x="62"  y="514">STEP 9</text>
    <text class="step-name" x="105" y="518">Flask Container Started</text>
    <text class="step-sub"  x="62"  y="532">poridhi-web · Flask + redis-py</text>
  </g>
  <line class="arrow flow" x1="180" y1="540" x2="180" y2="552" marker-end="url(#head)"/>

  <!-- 10. Application Available (highlighted end state) -->
  <g>
    <rect class="card-end" x="40"  y="554" width="280" height="42" rx="6"/>
    <text class="step-end-num"  x="52"  y="570">STEP 10</text>
    <text class="step-end-name" x="100" y="586">Application Available</text>
  </g>
</svg>